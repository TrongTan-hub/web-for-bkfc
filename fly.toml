# ============================================================
# fly.toml – Deploy lên Fly.io (MIỄN PHÍ 3 VM nhỏ/tháng)
# ============================================================
# Cách deploy:
#   1. Cài flyctl: curl -L https://fly.io/install.sh | sh
#   2. flyctl auth login
#   3. flyctl launch --no-deploy   (lần đầu)
#   4. flyctl secrets set GROQ_API_KEY=xxx ADMIN_API_KEY=xxx
#   5. flyctl deploy

app = "bkfc-tuyen-sinh"      # Tên app (phải unique trên Fly.io)
primary_region = "sin"       # Singapore – gần Việt Nam nhất

[build]
  dockerfile = "docker/Dockerfile.backend"

[env]
  PORT = "8080"
  ENV  = "production"

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines  = true   # Tắt khi không dùng (tiết kiệm free quota)
  auto_start_machines = true
  min_machines_running = 0

# Máy ảo nhỏ nhất (phù hợp free tier)
[[vm]]
  cpu_kind = "shared"
  cpus     = 1
  memory_mb = 512

# Volume lưu trữ bền vững (1GB miễn phí)
[mounts]
  source      = "bkfc_data"
  destination = "/app/data"

# Health check
[[services.http_checks]]
  interval    = "30s"
  timeout     = "10s"
  grace_period = "120s"
  method      = "GET"
  path        = "/api/health"
