# ============================================================
# railway.toml – Deploy lên Railway.app (MIỄN PHÍ $5 credit/tháng)
# ============================================================
# Cách dùng:
#   1. railway login
#   2. railway init
#   3. railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile.backend"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "bkfc-backend"

[services.variables]
PORT = "8000"
# Thêm GROQ_API_KEY và ADMIN_API_KEY trên Railway Dashboard
