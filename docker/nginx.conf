# ============================================================
# nginx.conf – Cấu hình Nginx cho BK Frontend
# ============================================================

server {
    listen 80;
    server_name _;   # Nhận tất cả domain

    # --- Charset mặc định ---
    charset utf-8;

    # --- Trang Landing là trang gốc ---
    root  /usr/share/nginx/html;
    index frontend/page1_landing/index.html;

    # --- Bật gzip để tăng tốc tải trang ---
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # ── Route: Trang chủ ─────────────────────────────────
    location = / {
        try_files /frontend/page1_landing/index.html =404;
    }

    # ── Route: Các trang frontend ────────────────────────
    location /frontend/ {
        try_files $uri $uri/ =404;
        # Cache 1 giờ cho CSS/JS
        location ~* \.(css|js)$ {
            expires 1h;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Route: Admin Panel ───────────────────────────────
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # ── Proxy: API calls tới FastAPI backend ─────────────
    location /api/ {
        proxy_pass         http://backend:8000;   # "backend" = tên service trong docker-compose
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout dài hơn vì RAG có thể chậm
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Xử lý lỗi ───────────────────────────────────────
    error_page 404 /frontend/page1_landing/index.html;
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
