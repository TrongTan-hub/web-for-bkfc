# ============================================================
# nginx.conf – Đã tối ưu che giấu URL (Clean URL)
# ============================================================

server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html; # Để mặc định là index.html

    # --- Bật gzip ---
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;

    # 1. Che giấu Landing Page: Truy cập / vẫn ra trang landing nhưng URL chỉ hiện "/"
    location = / {
        alias /usr/share/nginx/html/frontend/page1_landing/;
        try_files index.html =404;
    }

    # 2. Tạo các Alias "giấu tên" cho từng trang (Ví dụ: bạn muốn URL là /gioi-thieu)
    # Thay vì /frontend/page2_about/index.html -> chỉ còn /about
    location /about {
        alias /usr/share/nginx/html/frontend/page2_about/;
        try_files index.html =404;
    }

    # 3. Giấu prefix /frontend/ nhưng vẫn cho phép load CSS/JS/Images
    # Người dùng sẽ không bao giờ gõ trực tiếp được vào folder /frontend/
    location /static-assets/ {
        internal; # Chỉ Nginx được phép truy cập nội bộ
        alias /usr/share/nginx/html/frontend/;
    }

    # 4. Giữ nguyên Admin (URL ngắn sẵn rồi)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 5. Proxy API (Đã giấu IP backend thành công qua tên service "backend")
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # 6. Xử lý lỗi: Trả về landing page mà không đổi URL lỗi
    error_page 404 /frontend/page1_landing/index.html;
}